<section class="section">
    <h2 style="margin-bottom: 16px; color: #2f6fed;">创建课堂</h2>
    <div class="section-content">
        <form id="createClassroomForm">
            <div style="margin-bottom: 16px;">
                <label for="classroomName" style="display: block; margin-bottom: 8px;">课堂名称:</label>
                <input type="text" id="classroomName" name="classroomName" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 16px;">
                <label for="teacherName" style="display: block; margin-bottom: 8px;">教师姓名:</label>
                <input type="text" id="teacherName" name="teacherName" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <button type="submit" class="btn" style="background-color: #2f6fed; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: background-color 0.3s;">创建课堂</button>
        </form>
        <div id="classroomInfo" style="margin-top: 16px; display: none;">
            <h3>课堂信息</h3>
            <p>课堂名称: <span id="displayClassroomName"></span></p>
            <p>教师姓名: <span id="displayTeacherName"></span></p>
            <p>课堂ID: <span id="classroomId"></span></p>
            <div style="margin-top: 16px;">
                <a href="quiz.html" id="quizLink" class="btn" style="background-color: #2f6fed; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: background-color 0.3s; margin-right: 8px;">随堂答题</a>
                <a href="cards.html" id="cardsLink" class="btn" style="background-color: #2f6fed; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: background-color 0.3s; margin-right: 8px;">知识点卡片</a>
                <a href="games.html" id="gamesLink" class="btn" style="background-color: #2f6fed; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: background-color 0.3s;">趣味小游戏</a>
            </div>
        </div>
    </div>
</section>

<script>
    document.getElementById('createClassroomForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const classroomName = document.getElementById('classroomName').value;
        const teacherName = document.getElementById('teacherName').value;

        // 生成唯一课堂ID
        const classroomId = 'CLS-' + Math.random().toString(36).substr(2, 9).toUpperCase();

        // 显示课堂信息
        document.getElementById('displayClassroomName').textContent = classroomName;
        document.getElementById('displayTeacherName').textContent = teacherName;
        document.getElementById('classroomId').textContent = classroomId;

        // 更新链接
        document.getElementById('quizLink').href = 'quiz.html?id=' + classroomId;
        document.getElementById('cardsLink').href = 'cards.html?id=' + classroomId;
        document.getElementById('gamesLink').href = 'games.html?id=' + classroomId;

        // 显示课堂信息
        document.getElementById('classroomInfo').style.display = 'block';
    });
</script>
